<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Interleaver</title>

<style>
body {
    font-family: sans-serif;
    margin: 16px;
    background: #f5f5f5;
}

textarea {
    width: 100%;
    box-sizing: border-box;
    min-height: 90px;
    margin-bottom: 12px;
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: black;
    color: white;
    margin-bottom: 16px;
}

.output {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
    word-wrap: break-word;
    font-size: 18px;
    line-height: 1.5;
}

.error {
    color: red;
    margin-bottom: 12px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Word Interleaver</h2>

<p>Input A <span id="count-a">(0 words)</span></p>
<textarea id="a" placeholder="red blue green"></textarea>

<p>Input B <span id="count-b">(0 words)</span></p>
<textarea id="b" placeholder="one two three"></textarea>

<button onclick="interleave()">Interleave</button>

<div id="error" class="error"></div>

<p>Output 1</p>
<div id="out1" class="output"></div>

<p>Output 2</p>
<div id="out2" class="output"></div>

<script>
const inputA = document.getElementById("a");
const inputB = document.getElementById("b");

function words(text) {
    return text
        .trim()
        .split(/\s+/)
        .filter(Boolean);
}

function validate() {
    const a = words(inputA.value);
    const b = words(inputB.value);
    const valid = a.length === b.length && a.length > 0;

    inputA.style.border = valid ? "3px solid green" : "3px solid red";
    inputB.style.border = valid ? "3px solid green" : "3px solid red";

    const label = n => `(${n} word${n === 1 ? "" : "s"})`;
    document.getElementById("count-a").textContent = label(a.length);
    document.getElementById("count-b").textContent = label(b.length);

    return { a, b, valid };
}

function interleave() {
    const { a, b, valid } = validate();

    if (!valid) {
        return;
    }

    let out1 = [];
    let out2 = [];

    for (let i = 0; i < a.length; i++) {
        if (i % 2 === 0) {
            out1.push(a[i]);
            out2.push(b[i]);
        } else {
            out1.push(b[i]);
            out2.push(a[i]);
        }
    }

    document.getElementById("out1").textContent =
        out1.join(" ").trim();

    document.getElementById("out2").textContent =
        out2.join(" ").trim();
}

inputA.addEventListener("input", validate);
inputB.addEventListener("input", validate);

validate();
</script>

</body>
</html>
