<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Interleaver</title>

<style>
body {
    font-family: sans-serif;
    margin: 16px;
    background: #f5f5f5;
}

textarea {
    width: 100%;
    box-sizing: border-box;
    min-height: 90px;
    margin-bottom: 12px;
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: black;
    color: white;
    margin-bottom: 16px;
}

.output {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
    word-wrap: break-word;
    font-size: 18px;
    line-height: 1.5;
}

.error {
    color: red;
    margin-bottom: 12px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Word Interleaver</h2>

<p>Input A</p>
<textarea id="a" placeholder="red blue green"></textarea>

<p>Input B</p>
<textarea id="b" placeholder="one two three"></textarea>

<button onclick="interleave()">Interleave</button>

<div id="error" class="error"></div>

<p>Output 1</p>
<div id="out1" class="output"></div>

<p>Output 2</p>
<div id="out2" class="output"></div>

<script>
function interleave() {
    const a = document.getElementById("a").value
        .trim()
        .split(/\s+/)
        .filter(Boolean);

    const b = document.getElementById("b").value
        .trim()
        .split(/\s+/)
        .filter(Boolean);

    const error = document.getElementById("error");
    error.textContent = "";

    if (a.length !== b.length) {
        error.textContent =
            `Word counts must match. A=${a.length}, B=${b.length}`;
        return;
    }

    let out1 = [];
    let out2 = [];

    for (let i = 0; i < a.length; i++) {
        if (i % 2 === 0) {
            out1.push(a[i]);
            out1.push(b[i]);
        } else {
            out2.push(a[i]);
            out2.push(b[i]);
        }
    }

    document.getElementById("out1").textContent =
        out1.join(" ");

    document.getElementById("out2").textContent =
        out2.join(" ");
}
</script>

</body>
</html>
